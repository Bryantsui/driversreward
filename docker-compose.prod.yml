services:
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.backend
    environment:
      - DATABASE_URL=postgresql://rewards:rewards_secret@postgres:5432/driversreward
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_ADMIN_SECRET=${JWT_ADMIN_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - PORT=3000
      - NODE_ENV=production
      - ALLOWED_ORIGINS=https://driversreward.com,https://api.driversreward.com,https://www.driversreward.com,chrome-extension://*
      - LOG_LEVEL=info
      - PROXY_HK_URL=${PROXY_HK_URL:-}
      - PROXY_BR_URL=${PROXY_BR_URL:-}
      - SCRAPE_CONCURRENCY=${SCRAPE_CONCURRENCY:-2}
      - SCRAPE_ENABLED=${SCRAPE_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: driversreward
      POSTGRES_USER: rewards
      POSTGRES_PASSWORD: rewards_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rewards -d driversreward"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  migrate:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.backend
    command: npx prisma migrate deploy
    environment:
      - DATABASE_URL=postgresql://rewards:rewards_secret@postgres:5432/driversreward
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - migrate

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./landing-page:/usr/share/caddy
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  pgdata:
  caddy_data:
  caddy_config:
