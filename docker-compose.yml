services:
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://rewards:rewards_secret@postgres:5432/driversreward
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: dev_access_secret_change_me_in_production_min_32_chars
      JWT_REFRESH_SECRET: dev_refresh_secret_change_me_in_production_min_32_chars
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      PORT: "3000"
      NODE_ENV: development
      ALLOWED_ORIGINS: http://localhost:3001,http://localhost:5173
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: driversreward
      POSTGRES_USER: rewards
      POSTGRES_PASSWORD: rewards_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rewards -d driversreward"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.backend
    command: npx prisma migrate deploy
    environment:
      DATABASE_URL: postgresql://rewards:rewards_secret@postgres:5432/driversreward
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - migrate

volumes:
  pgdata:
